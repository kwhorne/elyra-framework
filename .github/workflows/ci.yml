name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  runtime:
    name: runtime typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        working-directory: runtime
        run: npm ci
      - name: Typecheck (TypeScript 7)
        working-directory: runtime
        run: >-
          npx -y -p typescript@7 tsc --noEmit --strict --skipLibCheck
          --lib dom,dom.iterable,es2020 --module esnext
          --moduleResolution bundler --target es2020 src/index.ts

  database:
    name: model tests (MySQL + Postgres)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: elyra_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s --health-timeout=5s --health-retries=15
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elyra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s --health-timeout=5s --health-retries=15
    env:
      ELYRA_TEST_MYSQL_URL: mysql://root:root@127.0.0.1:3306/elyra_test
      ELYRA_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/elyra_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps (webview + TLS)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev pkg-config
      - name: Model CRUD against real MySQL + Postgres
        run: cargo test -p elyra --features database --test model_servers -- --nocapture
