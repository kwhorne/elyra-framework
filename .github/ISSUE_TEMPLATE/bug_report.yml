name: Bug report
description: Report a problem with Elyra Framework
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (ideally a small code snippet or repo) that trigger the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Elyra Framework version
      placeholder: "0.1.0 (or git SHA)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: toolchain
    attributes:
      label: Rust / Node versions
      placeholder: "rustc 1.80.0, node 22.x"
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant console output, panics, or stack traces.
      render: shell
